{{- if and .Values.secret.create (not .Values.secret.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vvn-ce.fullname" . }}
  labels:
    {{- include "vvn-ce.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secret.databaseUrl | required "secret.databaseUrl is required" | quote }}
  OPENROUTER_API_KEY: {{ .Values.secret.openrouterApiKey | quote }}
{{- end }}
