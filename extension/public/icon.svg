<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Large open book icon - fills entire canvas, no background -->

  <!-- Left page - elegant light blue -->
  <path d="M 8 12 L 50 12 L 50 116 L 8 116 Q 0 110 0 98 L 0 26 Q 0 12 8 12 Z"
        fill="#3B82F6" opacity="0.9"/>

  <!-- Right page - vibrant primary blue -->
  <path d="M 50 12 L 92 12 Q 100 12 100 26 L 100 98 Q 100 110 92 116 L 50 116 Z"
        fill="#1D4ED8" opacity="0.95"/>

  <!-- Center spine/binding -->
  <rect x="46" y="12" width="8" height="104" fill="#0F3460"/>

  <!-- Decorative top accent - Vietnamese inspired (red) -->
  <path d="M 64 8 L 70 18 L 80 20 L 72 28 L 74 38 L 64 34 L 54 38 L 56 28 L 48 20 L 58 18 Z"
        fill="#DC2626"/>

  <!-- Left page content - text lines -->
  <line x1="16" y1="35" x2="42" y2="35" stroke="white" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
  <line x1="16" y1="50" x2="42" y2="50" stroke="white" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
  <line x1="16" y1="65" x2="40" y2="65" stroke="white" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
  <line x1="16" y1="80" x2="38" y2="80" stroke="white" stroke-width="2" opacity="0.7" stroke-linecap="round"/>

  <!-- Right page content - text lines with gradient feel -->
  <line x1="58" y1="35" x2="84" y2="35" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
  <line x1="58" y1="50" x2="84" y2="50" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
  <line x1="58" y1="65" x2="84" y2="65" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
  <line x1="58" y1="80" x2="82" y2="80" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>

  <!-- Bottom accent - highlight -->
  <circle cx="64" cy="105" r="6" fill="#FCD34D" opacity="0.8"/>
</svg>
