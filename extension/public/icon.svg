<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Simple clean book icon -->
  <g transform="translate(64, 64)">
    <!-- Left page -->
    <path d="M -22 -26 L -4 -26 L -4 26 L -22 26 Q -28 22 -28 14 L -28 -14 Q -28 -22 -22 -26 Z"
          fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Right page (filled) -->
    <path d="M 4 -26 L 22 -26 Q 28 -22 28 -14 L 28 14 Q 28 22 22 26 L 4 26 Z"
          fill="white" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Spine/center -->
    <line x1="0" y1="-26" x2="0" y2="26" stroke="white" stroke-width="2.8" stroke-linecap="round"/>

    <!-- Checkmark on right page - representing learning progress -->
    <g transform="translate(14, 2)">
      <path d="M -8 0 L -2 6 L 8 -6"
            fill="none" stroke="#DC2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
