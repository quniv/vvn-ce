<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Creative V symbol with book/learning theme -->
  <g transform="translate(64, 64)">
    <!-- Left page - angled upward forming "V" -->
    <path d="M -30 20 L -8 -28 L 0 -24 L -20 24 Z"
          fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Right page - angled upward forming "V" -->
    <path d="M 30 20 L 8 -28 L 0 -24 L 20 24 Z"
          fill="white" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Center spine - book binding -->
    <line x1="0" y1="-28" x2="0" y2="24" stroke="white" stroke-width="3" stroke-linecap="round"/>

    <!-- Text/content lines on right page -->
    <line x1="4" y1="-12" x2="14" y2="-4" stroke="#DC2626" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="4" y1="-4" x2="14" y2="4" stroke="#DC2626" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="4" y1="4" x2="12" y2="12" stroke="#DC2626" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>

    <!-- Vietnamese accent - red star at top -->
    <g transform="translate(0, -36)">
      <polygon points="0,-6 2,-1 7,-1 3,2 5,8 0,4 -5,8 -3,2 -7,-1 -2,-1" fill="#DC2626"/>
    </g>
  </g>
</svg>
