<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Open book with colorful pages -->
  <g transform="translate(64, 64)">
    <!-- Left page - light blue -->
    <path d="M -24 -28 L -2 -28 L -2 28 L -24 28 Q -30 24 -30 16 L -30 -16 Q -30 -24 -24 -28 Z"
          fill="#60A5FA"/>

    <!-- Right page - vibrant blue -->
    <path d="M 2 -28 L 24 -28 Q 30 -24 30 -16 L 30 16 Q 30 24 24 28 L 2 28 Z"
          fill="#3B82F6"/>

    <!-- Spine/binding - darker -->
    <rect x="-3" y="-28" width="6" height="56" fill="#1E40AF"/>

    <!-- Text lines on left page (light) -->
    <line x1="-20" y1="-12" x2="-6" y2="-12" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <line x1="-20" y1="-2" x2="-6" y2="-2" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <line x1="-20" y1="8" x2="-8" y2="8" stroke="white" stroke-width="1.5" opacity="0.6"/>

    <!-- Text lines on right page (bright) -->
    <line x1="6" y1="-12" x2="20" y2="-12" stroke="#93C5FD" stroke-width="1.5"/>
    <line x1="6" y1="-2" x2="20" y2="-2" stroke="#93C5FD" stroke-width="1.5"/>
    <line x1="6" y1="8" x2="20" y2="8" stroke="#93C5FD" stroke-width="1.5"/>

    <!-- Checkmark accent - red -->
    <g transform="translate(16, 18)">
      <path d="M -6 0 L -1 5 L 6 -4"
            fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
