name: Trivy Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  fs-scan:
    name: Trivy FS Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Trivy — filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-fs.sarif
          exit-code: "0"

      - name: Upload Trivy FS results to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  backend-image-scan:
    name: Trivy — Backend Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build backend image
        run: docker build -t vvn-backend:scan ./backend

      - name: Trivy — backend image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: vvn-backend:scan
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-backend.sarif
          exit-code: "0"

      - name: Upload backend image results to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend-image

  crawler-image-scan:
    name: Trivy — Crawler Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build crawler image
        run: docker build -t vvn-crawler:scan ./crawler

      - name: Trivy — crawler image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: vvn-crawler:scan
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-crawler.sarif
          exit-code: "0"

      - name: Upload crawler image results to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-crawler.sarif
          category: trivy-crawler-image
